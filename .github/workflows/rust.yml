name: Rust

on:
  push:
    paths: ['src/**', 'build.rs', 'Cargo.toml', 'Cargo.lock', 'libneoradio2/**', 'tests/**', 'examples/**', '.github/workflows/rust.yml']
  pull_request:
    paths: ['src/**', 'build.rs', 'Cargo.toml', 'Cargo.lock', 'libneoradio2/**', 'tests/**', 'examples/**', '.github/workflows/rust.yml']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --verbose
      - run: cargo test --verbose

  # Regenerate the FFI bindings from the C headers and confirm the fresh
  # bindings still compile and pass the tests. We deliberately do NOT diff
  # against the committed src/ffi.rs: bindgen output is environment-dependent
  # (C enum signedness and struct-packing differ between MSVC and GCC/clang,
  # and across libclang versions), so a byte-exact check can't pass on a
  # runner that differs from wherever the committed file was generated. This
  # catches the real risk — a C-header change that breaks the bindings.
  bindgen-regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate bindings, then build and test against them
        run: |
          cargo build --features bindgen
          cargo build
          cargo test
