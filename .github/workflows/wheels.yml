name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-13, macOS-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.21.3 build==1.2.2.post1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Build sdist
        if: runner.os == 'Linux'
        run: python -m build --sdist --outdir ./wheelhouse/

      # Name the artifact per-OS so the matrix jobs don't collide (upload-artifact
      # v4 errors on duplicate names).
      - uses: actions/upload-artifact@v4
        with:
          name: neoradio2-${{ matrix.os }}
          path: |
            ./wheelhouse/*.whl
            ./wheelhouse/*.tar.gz
          if-no-files-found: error