name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS-latest builds universal2 (arm64 + x86_64), so a separate
        # Intel macOS-13 runner is redundant.
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        # cibuildwheel 4.x is needed to build CPython 3.14 wheels.
        run: python -m pip install cibuildwheel==4.1.0 build==1.2.2.post1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Build sdist
        if: runner.os == 'Linux'
        run: python -m build --sdist --outdir ./wheelhouse/

      # Name the artifact per-OS so the matrix jobs don't collide (upload-artifact
      # v4 errors on duplicate names).
      - uses: actions/upload-artifact@v4
        with:
          name: neoradio2-${{ matrix.os }}
          path: |
            ./wheelhouse/*.whl
            ./wheelhouse/*.tar.gz
          if-no-files-found: error

  deploy_pypi:
    name: Deploy PyPI
    runs-on: ubuntu-latest
    needs: build_wheels
    # Only publish for version tags (e.g. v1.4.0), never on branch pushes/PRs.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect all built wheels and the sdist
        uses: actions/download-artifact@v4
        with:
          pattern: neoradio2-*
          merge-multiple: true
          path: ./wheelhouse/

      - name: Publish to PyPI
        run: |
          python -m pip install --upgrade twine
          twine check ./wheelhouse/*
          twine upload -u __token__ -p "${{ secrets.PYPI_TOKEN }}" --verbose ./wheelhouse/*