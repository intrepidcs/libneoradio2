name: Docs

# Rebuilds the Python API docs from the bindings and commits the refreshed
# HTML back to python/docs/html (served by GitHub Pages). This keeps the docs
# from drifting out of date with the bindings' docstrings and version.
on:
  push:
    branches: [master]
    paths:
      - 'python/src/**'
      - 'python/docs/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'python/src/**'
      - 'python/docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # hidapi's Linux backend needs libudev; the wheels job gets it inside the
      # manylinux container, but this job builds on the bare runner.
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install neoradio2 and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install -r python/docs/requirements.txt

      - name: Build the docs
        working-directory: python/docs
        run: |
          python generate_function_rst.py
          rm -rf html
          python -m sphinx -b html -d "$RUNNER_TEMP/doctrees" . html
          rm -rf html/.doctrees
          touch html/.nojekyll

      - name: Commit refreshed docs
        # Only publish on pushes to master / manual runs, not on PRs.
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/docs/html python/docs/functions.rst python/docs/classes.rst
          if git diff --cached --quiet; then
            echo "Docs already up to date."
          else
            # [skip ci] keeps this auto-commit from re-triggering the workflow.
            git commit -m "docs: rebuild Python API docs [skip ci]"
            git push
          fi
